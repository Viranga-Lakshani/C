<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitzy — Sri Lanka's Premium Property Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --cream: #faf7f2;
  --warm: #f5efe6;
  --brown: #2c1810;
  --gold: #c9873a;
  --gold-light: #e8a855;
  --text: #1a1208;
  --muted: #7a6a5a;
  --border: rgba(44,24,16,0.1);
  --surface: #ffffff;
  --shadow: 0 4px 20px rgba(44,24,16,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #fff; color: var(--text); }

/* TOP NAV */
nav {
  position: sticky; top: 0; z-index: 1000;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 0 40px; height: 70px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--brown); cursor: pointer; }
.logo span { color: var(--gold); }
.nav-links { display: flex; gap: 12px; align-items: center; }
.nav-btn { padding: 10px 20px; border-radius: 10px; border: none; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.nav-btn.ghost { background: transparent; color: var(--text); }
.nav-btn.primary { background: var(--brown); color: #fff; }
.nav-btn.gold { background: var(--gold); color: #fff; }

/* HOME HERO (Airbnb Style) */
.hero-section { padding: 40px 40px 20px; max-width: 1400px; margin: 0 auto; }
.search-bar-container {
  background: #fff; border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  border-radius: 50px; display: flex; align-items: center;
  padding: 8px 10px 8px 30px; margin-bottom: 40px;
}
.search-input-group { flex: 1; border-right: 1px solid var(--border); padding-right: 20px; }
.search-input-group:last-of-type { border-right: none; }
.search-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text); margin-bottom: 2px; }
.search-input-group input, .search-input-group select { 
  border: none; outline: none; width: 100%; font-family: 'Outfit'; font-size: 14px; color: var(--muted); background: transparent;
}
.search-circle { 
  width: 48px; height: 48px; background: var(--gold); border-radius: 50%; 
  display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;
}

/* CATEGORIES (Visible Grid) */
.category-section { margin-bottom: 40px; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
.cat-item {
  text-align: center; padding: 20px 10px; border-radius: 15px;
  background: var(--cream); border: 1px solid transparent; cursor: pointer; transition: 0.2s;
}
.cat-item:hover { border-color: var(--gold); background: #fff; box-shadow: var(--shadow); }
.cat-icon { font-size: 32px; margin-bottom: 8px; display: block; }
.cat-name { font-weight: 700; font-size: 14px; color: var(--brown); }
.cat-count { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* SPLIT MAP VIEW (Professional Real Estate Style) */
.home-discover { display: grid; grid-template-columns: 1fr 450px; gap: 20px; height: 600px; margin-bottom: 60px; }
.home-map-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; }
#homeMap { width: 100%; height: 100%; }
.featured-list { overflow-y: auto; padding-right: 10px; }
.section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
.section-header h2 { font-family: 'Playfair Display'; font-size: 24px; font-weight: 800; }
.view-all { color: var(--gold); font-weight: 700; font-size: 13px; text-decoration: none; cursor: pointer; }

/* MINI CARD (For Home Sidebar) */
.mini-card {
  display: flex; gap: 15px; background: #fff; padding: 12px;
  border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--border);
  transition: 0.2s; cursor: pointer;
}
.mini-card:hover { border-color: var(--gold); box-shadow: var(--shadow); }
.mini-img { width: 100px; height: 85px; border-radius: 10px; background: var(--brown); display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; }
.mini-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.mini-price { font-family: 'Playfair Display'; font-weight: 700; color: var(--gold); font-size: 16px; }
.mini-title { font-size: 13px; font-weight: 600; margin: 2px 0; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px; }
.mini-loc { font-size: 11px; color: var(--muted); }

/* OTHER PAGES (Hidden by default) */
.page { display: none; }
.page.active { display: block; }

@media (max-width: 1000px) {
  .home-discover { grid-template-columns: 1fr; height: auto; }
  .home-map-wrap { height: 400px; }
  .featured-list { height: 500px; }
  .search-bar-container { flex-direction: column; border-radius: 20px; padding: 20px; gap: 15px; }
  .search-input-group { border-right: none; border-bottom: 1px solid var(--border); padding: 0 0 10px 0; }
}
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">Infinit<span>zy</span></div>
  <div class="nav-links">
    <button class="nav-btn ghost" onclick="showPage('home')">Home</button>
    <button class="nav-btn ghost" onclick="showPage('browse')">Browse All</button>
    <button class="nav-btn gold" onclick="showPage('post')">Post Ad Free</button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="hero-section">
    <div class="search-bar-container">
      <div class="search-input-group">
        <div class="search-label">Location</div>
        <input type="text" id="h-loc" placeholder="Where in Sri Lanka?">
      </div>
      <div class="search-input-group">
        <div class="search-label">Property Type</div>
        <select id="h-type">
          <option value="All">Any Property Type</option>
          <option>House</option><option>Land</option><option>Apartment</option><option>Villa</option>
        </select>
      </div>
      <div class="search-input-group">
        <div class="search-label">Price Range</div>
        <select id="h-price">
          <option value="0">Any Price</option>
          <option value="10M">Under 10 Million</option>
          <option value="50M">10M - 50 Million</option>
          <option value="100M">50M+</option>
        </select>
      </div>
      <div class="search-circle" onclick="doGlobalSearch()">🔍</div>
    </div>

    <div class="category-section">
      <div class="cat-grid" id="catGrid">
        <div class="cat-item" onclick="filterAndBrowse('House')">
          <span class="cat-icon">🏠</span>
          <div class="cat-name">Houses</div>
          <div class="cat-count" id="c-house">0 listings</div>
        </div>
        <div class="cat-item" onclick="filterAndBrowse('Land')">
          <span class="cat-icon">🌿</span>
          <div class="cat-name">Land</div>
          <div class="cat-count" id="c-land">0 listings</div>
        </div>
        <div class="cat-item" onclick="filterAndBrowse('Apartment')">
          <span class="cat-icon">🏢</span>
          <div class="cat-name">Apartments</div>
          <div class="cat-count" id="c-apt">0 listings</div>
        </div>
        <div class="cat-item" onclick="filterAndBrowse('Villa')">
          <span class="cat-icon">🏡</span>
          <div class="cat-name">Villas</div>
          <div class="cat-count" id="c-villa">0 listings</div>
        </div>
        <div class="cat-item" onclick="filterAndBrowse('Commercial')">
          <span class="cat-icon">🏪</span>
          <div class="cat-name">Commercial</div>
          <div class="cat-count" id="c-comm">0 listings</div>
        </div>
        <div class="cat-item" onclick="filterAndBrowse('Room')">
          <span class="cat-icon">🛏️</span>
          <div class="cat-name">Rooms</div>
          <div class="cat-count" id="c-room">0 listings</div>
        </div>
      </div>
    </div>

    <div class="home-discover">
      <div class="home-map-wrap">
        <div id="homeMap"></div>
      </div>
      <div class="featured-list">
        <div class="section-header">
          <h2>Latest Listings</h2>
          <div class="view-all" onclick="showPage('browse')">View all results →</div>
        </div>
        <div id="latestHomeGrid">
          </div>
      </div>
    </div>
  </div>
</div>

<div id="page-browse" class="page" style="padding:100px; text-align:center;">
    <h2>Browse Page Placeholder</h2>
    <button onclick="showPage('home')">Back to Home</button>
</div>
<div id="page-post" class="page" style="padding:100px; text-align:center;">
    <h2>Post Ad Page Placeholder</h2>
    <button onclick="showPage('home')">Back to Home</button>
</div>

<script>
// MOCK DATA
const listings = [
  { id:1, title:'Modern 3BR House - Colombo', price:28500000, type:'House', dist:'Colombo', lat:6.9271, lng:79.8612 },
  { id:2, title:'Ocean View Villa - Galle', price:95000000, type:'Villa', dist:'Galle', lat:6.0367, lng:80.2170 },
  { id:3, title:'20 Perch Land - Kandy', price:12000000, type:'Land', dist:'Kandy', lat:7.2906, lng:80.6337 },
  { id:4, title:'Luxury Apartment - Negombo', price:45000000, type:'Apartment', dist:'Negombo', lat:7.2083, lng:79.8358 }
];

let homeMap;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if (id === 'home') initHome();
  window.scrollTo(0,0);
}

function initHome() {
  updateCounts();
  renderLatest();
  
  if (!homeMap) {
    homeMap = L.map('homeMap').setView([7.8731, 80.7718], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(homeMap);
  }
  
  // Render Markers
  listings.forEach(l => {
    L.marker([l.lat, l.lng]).addTo(homeMap).bindPopup(`<b>${l.title}</b><br>LKR ${l.price.toLocaleString()}`);
  });
}

function updateCounts() {
  const counts = { House:0, Land:0, Apartment:0, Villa:0, Commercial:0, Room:0 };
  listings.forEach(l => counts[l.type]++);
  
  document.getElementById('c-house').innerText = counts.House + ' listings';
  document.getElementById('c-land').innerText = counts.Land + ' listings';
  document.getElementById('c-apt').innerText = counts.Apartment + ' listings';
  document.getElementById('c-villa').innerText = counts.Villa + ' listings';
  document.getElementById('c-comm').innerText = counts.Commercial + ' listings';
  document.getElementById('c-room').innerText = counts.Room + ' listings';
}

function renderLatest() {
  const container = document.getElementById('latestHomeGrid');
  const icons = { House:'🏠', Land:'🌿', Apartment:'🏢', Villa:'🏡' };
  
  container.innerHTML = listings.map(l => `
    <div class="mini-card" onclick="alert('Viewing: ${l.title}')">
      <div class="mini-img">${icons[l.type] || '🏠'}</div>
      <div class="mini-info">
        <div class="mini-price">LKR ${(l.price/1000000).toFixed(1)}M</div>
        <div class="mini-title">${l.title}</div>
        <div class="mini-loc">📍 ${l.dist}</div>
      </div>
    </div>
  `).join('');
}

function filterAndBrowse(type) {
  alert("Filtering for: " + type + ". Redirecting to Browse page...");
  showPage('browse');
}

function doGlobalSearch() {
  const loc = document.getElementById('h-loc').value;
  alert("Searching in: " + loc);
  showPage('browse');
}

// Start on Home
window.onload = initHome;
</script>
</body>
</html>
