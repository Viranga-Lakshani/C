<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinitzy — Premium Sri Lankan Real Estate</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --brown: #2c1810;
      --gold: #c9873a;
      --cream: #faf7f2;
      --text: #1a1208;
      --border: rgba(44,24,16,0.1);
      --shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; color: var(--text); background: #fff; overflow-x: hidden; }

    /* --- NAVIGATION --- */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 2000;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
      height: 80px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--brown); cursor: pointer; }
    .logo span { color: var(--gold); }
    
    .nav-right { display: flex; gap: 15px; align-items: center; }
    .nav-btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Outfit'; }
    .btn-ghost { background: transparent; color: var(--text); }
    .btn-brown { background: var(--brown); color: white; }
    .menu-trigger { font-size: 24px; cursor: pointer; display: none; }

    /* --- SIDE MENU --- */
    #sideMenu {
      position: fixed; right: -300px; top: 0; width: 300px; height: 100%;
      background: var(--brown); z-index: 3000; transition: 0.4s; padding: 60px 40px;
    }
    #sideMenu.open { right: 0; }
    #sideMenu a { display: block; color: #fff; text-decoration: none; font-size: 20px; margin-bottom: 25px; font-weight: 300; }
    .close-menu { position: absolute; top: 20px; left: 20px; color: white; cursor: pointer; }

    /* --- FULL MAP HOME --- */
    .home-wrapper { position: relative; height: 100vh; width: 100%; padding-top: 80px; }
    #homeMap { height: 100%; width: 100%; z-index: 1; }

    /* OVERLAY SEARCH */
    .map-overlay-search {
      position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
      z-index: 1001; width: 90%; max-width: 800px;
      background: white; padding: 10px; border-radius: 50px;
      display: flex; box-shadow: var(--shadow);
    }
    .search-group { flex: 1; padding: 0 20px; border-right: 1px solid var(--border); }
    .search-group:last-of-type { border: none; }
    .search-group label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--gold); }
    .search-group input { border: none; outline: none; width: 100%; font-size: 14px; padding: 5px 0; }

    /* PROPERTY TRAY (The sliding cards at bottom) */
    .property-tray {
      position: absolute; bottom: 30px; left: 0; width: 100%;
      z-index: 1001; display: flex; gap: 20px; overflow-x: auto;
      padding: 0 40px 20px; scroll-behavior: smooth;
    }
    .property-tray::-webkit-scrollbar { display: none; }
    
    .map-card {
      min-width: 300px; background: white; border-radius: 20px;
      overflow: hidden; box-shadow: var(--shadow); cursor: pointer;
    }
    .card-img { height: 150px; background: var(--brown); background-size: cover; background-position: center; position: relative; }
    .card-tag { position: absolute; top: 10px; left: 10px; background: var(--gold); color: white; padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; }
    .card-body { padding: 15px; }
    .card-price { font-family: 'Playfair Display'; font-size: 18px; font-weight: 700; color: var(--gold); }
    .card-title { font-size: 14px; font-weight: 600; margin: 5px 0; }

    /* --- AUTH MODALS --- */
    .modal-backdrop {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 4000; display: none;
      align-items: center; justify-content: center;
    }
    .auth-card {
      background: white; width: 400px; padding: 40px; border-radius: 24px; position: relative;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .auth-card h2 { font-family: 'Playfair Display'; margin-bottom: 20px; }
    .auth-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); font-family: 'Outfit'; }
    .auth-toggle { font-size: 13px; text-align: center; margin-top: 15px; cursor: pointer; color: var(--gold); }

    /* --- POST AD SECTION --- */
    .page { display: none; padding-top: 120px; min-height: 100vh; }
    .page.active { display: block; }
    .form-container { max-width: 600px; margin: 0 auto; background: var(--cream); padding: 40px; border-radius: 30px; }

    @media (max-width: 768px) {
      .nav-right .btn-ghost { display: none; }
      .menu-trigger { display: block; }
      .map-overlay-search { flex-direction: column; border-radius: 20px; top: 90px; }
      .search-group { border: none; border-bottom: 1px solid var(--border); padding: 10px 20px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">Infinit<span>zy</span></div>
  <div class="nav-right">
    <button class="nav-btn btn-ghost" onclick="openAuth('login')">Login</button>
    <button class="nav-btn btn-brown" onclick="openAuth('signup')">Sign Up</button>
    <button class="nav-btn btn-brown" style="background:var(--gold)" onclick="showPage('post')">Post Ad</button>
    <div class="menu-trigger" onclick="toggleMenu(true)">☰</div>
  </div>
</nav>

<div id="sideMenu">
    <div class="close-menu" onclick="toggleMenu(false)">✕ Close</div>
    <a href="#" onclick="showPage('home'); toggleMenu(false)">Home</a>
    <a href="#" onclick="showPage('post'); toggleMenu(false)">List Property</a>
    <a href="#" onclick="openAuth('login'); toggleMenu(false)">My Account</a>
    <a href="#">Saved Listings</a>
    <a href="#">Contact Support</a>
</div>

<div id="page-home" class="page active" style="padding-top:0;">
  <div class="home-wrapper">
    <div id="homeMap"></div>
    
    <div class="map-overlay-search">
      <div class="search-group">
        <label>Location</label>
        <input type="text" placeholder="Where are you looking?">
      </div>
      <div class="search-group">
        <label>Type</label>
        <select style="border:none; width:100%; outline:none; font-family:'Outfit'; font-size:14px;">
            <option>All Types</option>
            <option>Houses</option>
            <option>Apartments</option>
            <option>Land</option>
        </select>
      </div>
      <div class="search-group" style="display:flex; align-items:center; justify-content:center;">
        <button class="nav-btn btn-brown" style="width:100%">Search</button>
      </div>
    </div>

    <div class="property-tray" id="propertyTray">
        </div>
  </div>
</div>

<div id="page-post" class="page">
    <div class="form-container">
        <h2 style="font-family:'Playfair Display'; margin-bottom:20px;">List Your Property</h2>
        <div style="border:2px dashed var(--gold); padding:40px; text-align:center; border-radius:20px; cursor:pointer; margin-bottom:20px;" onclick="document.getElementById('imgInp').click()">
            <p>Click to add property photos</p>
            <input type="file" id="imgInp" hidden multiple onchange="handleImgs(event)">
            <div id="previews" style="display:flex; gap:10px; margin-top:10px; justify-content:center;"></div>
        </div>
        <input type="text" id="p-title" placeholder="Property Title">
        <input type="number" id="p-price" placeholder="Price (LKR)">
        <select id="p-dist" style="width:100%; padding:14px; border-radius:10px; margin-bottom:15px; border:1px solid var(--border);">
            <option>Colombo</option><option>Kandy</option><option>Galle</option><option>Negombo</option>
        </select>
        <button class="submit-btn btn-brown nav-btn" style="width:100%" onclick="saveAd()">Publish Ad</button>
    </div>
</div>

<div id="authModal" class="modal-backdrop" onclick="closeAuth(event)">
    <div class="auth-card" onclick="event.stopPropagation()">
        <h2 id="authTitle">Welcome Back</h2>
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <button class="nav-btn btn-brown" style="width:100%">Continue</button>
        <div class="auth-toggle" id="authToggle" onclick="toggleAuthType()">Don't have an account? Sign Up</div>
    </div>
</div>

<script>
let listings = [
  { id:1, title:'Modern 3BR Rajagiriya House', price:28500000, dist:'Colombo', lat:6.9067, lng:79.8955, img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80' },
  { id:2, title:'Galle Fort Heritage Villa', price:120000000, dist:'Galle', lat:6.0333, lng:80.2167, img:'https://images.unsplash.com/photo-1580587771525-78b9daa3b914?auto=format&fit=crop&w=400&q=80' },
  { id:3, title:'Hill Country Land - Kandy', price:15000000, dist:'Kandy', lat:7.2906, lng:80.6337, img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=400&q=80' }
];

let homeMap;
let uploadedImg = "";

function toggleMenu(open) {
    document.getElementById('sideMenu').className = open ? 'open' : '';
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    if(id === 'home') setTimeout(() => homeMap.invalidateSize(), 200);
}

function openAuth(type) {
    document.getElementById('authModal').style.display = 'flex';
    if(type === 'signup') toggleAuthType(true);
}

function closeAuth(e) {
    document.getElementById('authModal').style.display = 'none';
}

function toggleAuthType(forceSignup = false) {
    const title = document.getElementById('authTitle');
    const toggle = document.getElementById('authToggle');
    if(forceSignup || toggle.innerText.includes('Sign Up')) {
        title.innerText = "Create Account";
        toggle.innerText = "Already have an account? Login";
    } else {
        title.innerText = "Welcome Back";
        toggle.innerText = "Don't have an account? Sign Up";
    }
}

function handleImgs(e) {
    const reader = new FileReader();
    reader.onload = (event) => {
        uploadedImg = event.target.result;
        document.getElementById('previews').innerHTML = `<img src="${uploadedImg}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">`;
    };
    reader.readAsDataURL(e.target.files[0]);
}

function initMap() {
    homeMap = L.map('homeMap', { zoomControl: false }).setView([7.8731, 80.7718], 8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(homeMap);
    
    renderListings();
}

function renderListings() {
    const tray = document.getElementById('propertyTray');
    tray.innerHTML = "";
    
    listings.forEach(l => {
        // Add Marker
        L.marker([l.lat, l.lng]).addTo(homeMap).bindPopup(l.title);

        // Add Card to Tray
        const card = document.createElement('div');
        card.className = "map-card";
        card.innerHTML = `
            <div class="card-img" style="background-image:url('${l.img}')">
                <div class="card-tag">${l.dist}</div>
            </div>
            <div class="card-body">
                <div class="card-price">LKR ${(l.price/1000000).toFixed(1)}M</div>
                <div class="card-title">${l.title}</div>
            </div>
        `;
        card.onclick = () => homeMap.flyTo([l.lat, l.lng], 14);
        tray.appendChild(card);
    });
}

function saveAd() {
    const newAd = {
        id: Date.now(),
        title: document.getElementById('p-title').value,
        price: parseInt(document.getElementById('p-price').value),
        dist: document.getElementById('p-dist').value,
        lat: 6.9 + (Math.random() * 0.5),
        lng: 79.8 + (Math.random() * 0.5),
        img: uploadedImg || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=400&q=80'
    };
    listings.unshift(newAd);
    renderListings();
    showPage('home');
    alert("Listing Published Successfully!");
}

window.onload = initMap;
</script>
</body>
</html>
