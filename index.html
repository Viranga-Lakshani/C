<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitzy — Advanced Marketplace</title><style>
/* NEW ADDITIONS */
.top-ads {padding:15px;background:#fff;border-bottom:1px solid #ddd;display:flex;gap:10px;overflow:auto}
.top-ad {min-width:220px;padding:10px;border:2px solid gold;border-radius:10px;background:#fff7e6}
.featured-badge {position:absolute;top:10px;right:10px;background:gold;color:#000;padding:3px 8px;font-size:11px;border-radius:5px}
.payment-box {background:#fff;padding:20px;border-radius:12px;border:1px solid #ddd;margin-top:20px}
</style></head>
<body><h2>Top Ads (Paid)</h2>
<div class="top-ads" id="topAds"></div><h2>All Listings</h2>
<div id="listings"></div><h2>Post Ad</h2>
<input type="file" id="fileInput" multiple accept="image/*" capture="environment">
<div id="preview"></div><div class="payment-box">
<h3>Upgrade Ad</h3>
<select id="plan">
<option value="free">Free</option>
<option value="featured">Featured (LKR 500)</option>
<option value="top">Top Ad (LKR 1000)</option>
</select>
<button onclick="payNow()">Pay Now</button>
</div><script>
let ads = [];

// IMAGE BROWSING (DEVICE)
document.getElementById('fileInput').addEventListener('change', function(e){
  const preview = document.getElementById('preview');
  preview.innerHTML = '';
  Array.from(e.target.files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = function(ev){
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.style.width='80px';
      img.style.margin='5px';
      preview.appendChild(img);
    }
    reader.readAsDataURL(file);
  })
});

// ADD SAMPLE AD
function addAd(title, plan){
  ads.push({title, plan});
  renderAds();
}

function renderAds(){
  const list = document.getElementById('listings');
  const top = document.getElementById('topAds');
  list.innerHTML='';
  top.innerHTML='';

  ads.forEach(a=>{
    const div=document.createElement('div');
    div.style.position='relative';
    div.style.border='1px solid #ccc';
    div.style.margin='10px';
    div.style.padding='10px';
    div.innerHTML=a.title;

    if(a.plan==='featured'){
      div.innerHTML += '<div class="featured-badge">FEATURED</div>';
    }

    if(a.plan==='top'){
      const t=document.createElement('div');
      t.className='top-ad';
      t.innerHTML=a.title + ' ⭐';
      top.appendChild(t);
    }

    list.appendChild(div);
  });
}

// PAYMENT SIMULATION
function payNow(){
  const plan=document.getElementById('plan').value;
  alert('Payment Successful for '+plan);
  addAd('Sample Property '+Math.random().toFixed(2), plan);
}
</script></body>
</html>
