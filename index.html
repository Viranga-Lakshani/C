<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinitzy — Sri Lanka's Premium Property Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --cream: #faf7f2;
      --warm: #f5efe6;
      --brown: #2c1810;
      --gold: #c9873a;
      --gold-light: #e8a855;
      --text: #1a1208;
      --muted: #7a6a5a;
      --border: rgba(44,24,16,0.1);
      --surface: #ffffff;
      --shadow: 0 4px 20px rgba(44,24,16,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #fff; color: var(--text); overflow-x: hidden; }

    /* --- NAVIGATION --- */
    nav {
      position: sticky; top: 0; z-index: 1000;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 70px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--brown); cursor: pointer; }
    .logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 12px; align-items: center; }
    .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .nav-btn.ghost { background: transparent; color: var(--text); }
    .nav-btn.gold { background: var(--gold); color: #fff; }

    .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
    .page { display: none; min-height: calc(100vh - 70px); }
    .page.active { display: block; }

    /* --- HOME HERO & SEARCH --- */
    .search-bar-container {
      background: #fff; border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border-radius: 50px; display: flex; align-items: center;
      padding: 8px 10px 8px 30px; margin-bottom: 40px;
    }
    .search-input-group { flex: 1; border-right: 1px solid var(--border); padding-right: 20px; }
    .search-input-group:last-of-type { border-right: none; }
    .search-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text); margin-bottom: 2px; }
    .search-input-group input, .search-input-group select { 
      border: none; outline: none; width: 100%; font-family: 'Outfit'; font-size: 14px; color: var(--muted); background: transparent;
    }
    .search-circle { 
      width: 48px; height: 48px; background: var(--gold); border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;
    }

    /* --- CATEGORIES --- */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 40px;}
    .cat-item {
      text-align: center; padding: 20px 10px; border-radius: 15px;
      background: var(--cream); border: 1px solid transparent; cursor: pointer; transition: 0.2s;
    }
    .cat-item:hover { border-color: var(--gold); background: #fff; box-shadow: var(--shadow); }
    .cat-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .cat-name { font-weight: 700; font-size: 14px; color: var(--brown); }
    .cat-count { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* --- HOME MAP SECTION --- */
    .home-discover { display: grid; grid-template-columns: 1fr 450px; gap: 30px; height: 600px; }
    .home-map-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
    #homeMap { width: 100%; height: 100%; z-index: 1; }
    .featured-list { overflow-y: auto; padding-right: 10px; }
    .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
    .section-header h2 { font-family: 'Playfair Display'; font-size: 28px; font-weight: 800; }
    .view-all { color: var(--gold); font-weight: 700; font-size: 13px; text-decoration: none; cursor: pointer; }

    /* --- LISTING CARDS --- */
    .mini-card {
      display: flex; gap: 15px; background: #fff; padding: 12px;
      border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--border);
      transition: 0.2s; cursor: pointer;
    }
    .mini-card:hover { transform: translateY(-3px); border-color: var(--gold); box-shadow: var(--shadow); }
    .mini-img { width: 100px; height: 85px; border-radius: 10px; background: var(--brown); display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; }
    .mini-info { flex: 1; }
    .mini-price { font-family: 'Playfair Display'; font-weight: 700; color: var(--gold); font-size: 17px; }
    .mini-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .mini-loc { font-size: 12px; color: var(--muted); }

    /* --- BROWSE PAGE LAYOUT --- */
    .browse-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
    .filter-sidebar { background: var(--cream); padding: 25px; border-radius: 20px; height: fit-content; position: sticky; top: 100px; }
    .filter-group { margin-bottom: 20px; }
    .filter-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; }
    .filter-group select, .filter-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-family: 'Outfit'; }
    .grid-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    /* --- POST AD FORM --- */
    .form-card { max-width: 700px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
    .full-width { grid-column: span 2; }
    .form-label { font-weight: 700; font-size: 14px; margin-bottom: 6px; display: block; }
    .submit-btn { width: 100%; padding: 16px; background: var(--brown); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; margin-top: 30px; cursor: pointer; transition: 0.3s; }
    .submit-btn:hover { background: var(--gold); }

    @media (max-width: 1000px) {
      .home-discover, .browse-layout { grid-template-columns: 1fr; height: auto; }
      .nav-links .ghost { display: none; }
      .home-map-wrap { height: 350px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="showPage('home')">Infinit<span>zy</span></div>
  <div class="nav-links">
    <button class="nav-btn ghost" onclick="showPage('home')">Home</button>
    <button class="nav-btn ghost" onclick="showPage('browse')">Browse All</button>
    <button class="nav-btn gold" onclick="showPage('post')">Post Ad Free</button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="container">
    <div class="search-bar-container">
      <div class="search-input-group">
        <div class="search-label">Location</div>
        <input type="text" id="h-loc" placeholder="Anywhere in Sri Lanka">
      </div>
      <div class="search-input-group">
        <div class="search-label">Property Type</div>
        <select id="h-type">
          <option value="All">All Categories</option>
          <option>House</option><option>Land</option><option>Apartment</option><option>Villa</option><option>Commercial</option>
        </select>
      </div>
      <div class="search-circle" onclick="doGlobalSearch()">🔍</div>
    </div>

    <div class="cat-grid">
      <div class="cat-item" onclick="filterAndBrowse('House')">
        <span class="cat-icon">🏠</span><div class="cat-name">Houses</div><div class="cat-count" id="c-house">0 listings</div>
      </div>
      <div class="cat-item" onclick="filterAndBrowse('Land')">
        <span class="cat-icon">🌿</span><div class="cat-name">Land</div><div class="cat-count" id="c-land">0 listings</div>
      </div>
      <div class="cat-item" onclick="filterAndBrowse('Apartment')">
        <span class="cat-icon">🏢</span><div class="cat-name">Apartments</div><div class="cat-count" id="c-apt">0 listings</div>
      </div>
      <div class="cat-item" onclick="filterAndBrowse('Villa')">
        <span class="cat-icon">🏡</span><div class="cat-name">Villas</div><div class="cat-count" id="c-villa">0 listings</div>
      </div>
      <div class="cat-item" onclick="filterAndBrowse('Commercial')">
        <span class="cat-icon">🏪</span><div class="cat-name">Commercial</div><div class="cat-count" id="c-comm">0 listings</div>
      </div>
    </div>

    <div class="home-discover">
      <div class="home-map-wrap"><div id="homeMap"></div></div>
      <div class="featured-list">
        <div class="section-header">
          <h2>Latest Listings</h2>
          <div class="view-all" onclick="showPage('browse')">Explore All →</div>
        </div>
        <div id="latestHomeGrid"></div>
      </div>
    </div>
  </div>
</div>

<div id="page-browse" class="page">
  <div class="container">
    <div class="section-header">
      <h2 id="browse-title">Discover Properties</h2>
    </div>
    <div class="browse-layout">
      <aside class="filter-sidebar">
        <div class="filter-group">
          <label>District</label>
          <select id="f-dist" onchange="applyFilters()">
            <option value="All">All Districts</option>
            <option>Colombo</option><option>Kandy</option><option>Galle</option><option>Negombo</option><option>Jaffna</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Category</label>
          <select id="f-type" onchange="applyFilters()">
            <option value="All">Everything</option>
            <option>House</option><option>Land</option><option>Apartment</option><option>Villa</option><option>Commercial</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Max Price (LKR)</label>
          <input type="number" id="f-price" placeholder="e.g. 50,000,000" oninput="applyFilters()">
        </div>
        <button class="submit-btn" style="background:var(--gold); margin-top:10px;" onclick="resetFilters()">Reset All</button>
      </aside>
      <div class="grid-results" id="browseGrid"></div>
    </div>
  </div>
</div>

<div id="page-post" class="page">
  <div class="container">
    <div class="form-card">
      <h2 style="font-family:'Playfair Display'; font-size:32px;">List Your Property</h2>
      <p style="color:var(--muted); margin-bottom:10px;">Fill in the details below to reach premium buyers.</p>
      
      <div class="form-grid">
        <div class="full-width">
          <label class="form-label">Property Title</label>
          <input type="text" id="p-title" placeholder="e.g. Luxury 4BR Villa with Pool">
        </div>
        <div>
          <label class="form-label">Category</label>
          <select id="p-type">
            <option>House</option><option>Land</option><option>Apartment</option><option>Villa</option><option>Commercial</option>
          </select>
        </div>
        <div>
          <label class="form-label">District</label>
          <select id="p-dist">
            <option>Colombo</option><option>Galle</option><option>Kandy</option><option>Negombo</option><option>Other</option>
          </select>
        </div>
        <div>
          <label class="form-label">Price (LKR)</label>
          <input type="number" id="p-price" placeholder="Total Amount">
        </div>
        <div>
          <label class="form-label">Contact Number</label>
          <input type="text" id="p-phone" placeholder="077 123 4567">
        </div>
      </div>
      <button class="submit-btn" onclick="submitAd()">Post Advertisement</button>
    </div>
  </div>
</div>

<script>
// --- GLOBAL DATA & STATE ---
let listings = [
  { id:1, title:'Modern 3BR House - Rajagiriya', price:28500000, type:'House', dist:'Colombo', lat:6.9067, lng:79.8955 },
  { id:2, title:'Ocean Front Villa - Unawatuna', price:105000000, type:'Villa', dist:'Galle', lat:6.0174, lng:80.2489 },
  { id:3, title:'20 Perch Prime Land - Kandy', price:18000000, type:'Land', dist:'Kandy', lat:7.2906, lng:80.6337 },
  { id:4, title:'Luxury Apartment - Colombo 03', price:55000000, type:'Apartment', dist:'Colombo', lat:6.9167, lng:79.8500 }
];

let homeMap;
let mapMarkers = [];
const icons = { House:'🏠', Land:'🌿', Apartment:'🏢', Villa:'🏡', Commercial:'🏪' };

// --- PAGE NAVIGATION ---
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  
  if (id === 'home') initHome();
  if (id === 'browse') applyFilters();
  window.scrollTo(0,0);
}

// --- HOME PAGE INITIALIZATION ---
function initHome() {
  updateCounts();
  renderLatestListings();
  initMap();
}

function updateCounts() {
  const counts = { House:0, Land:0, Apartment:0, Villa:0, Commercial:0 };
  listings.forEach(l => { if(counts[l.type] !== undefined) counts[l.type]++; });
  
  for (let key in counts) {
    const el = document.getElementById(`c-${key.toLowerCase().substring(0,4)}`);
    if(el) el.innerText = `${counts[key]} listings`;
  }
}

function renderLatestListings() {
  const container = document.getElementById('latestHomeGrid');
  // Sort by ID descending to show newest first
  const sorted = [...listings].sort((a,b) => b.id - a.id).slice(0, 5);

  container.innerHTML = sorted.map(l => `
    <div class="mini-card" onclick="viewProperty(${l.id})">
      <div class="mini-img">${icons[l.type] || '🏠'}</div>
      <div class="mini-info">
        <div class="mini-price">LKR ${(l.price/1000000).toFixed(1)}M</div>
        <div class="mini-title">${l.title}</div>
        <div class="mini-loc">📍 ${l.dist} • ${l.type}</div>
      </div>
    </div>
  `).join('');
}

function initMap() {
  if (!homeMap) {
    homeMap = L.map('homeMap').setView([7.8731, 80.7718], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(homeMap);
  }

  // Clear existing markers
  mapMarkers.forEach(m => homeMap.removeLayer(m));
  mapMarkers = [];

  // Add markers for all current listings
  listings.forEach(l => {
    const marker = L.marker([l.lat, l.lng]).addTo(homeMap)
      .bindPopup(`<b>${l.title}</b><br>LKR ${l.price.toLocaleString()}`);
    mapMarkers.push(marker);
  });
}

// --- SEARCH & FILTER LOGIC ---
function doGlobalSearch() {
  const loc = document.getElementById('h-loc').value;
  const type = document.getElementById('h-type').value;
  
  if(type !== 'All') document.getElementById('f-type').value = type;
  showPage('browse');
}

function filterAndBrowse(type) {
  document.getElementById('f-type').value = type;
  showPage('browse');
}

function applyFilters() {
  const type = document.getElementById('f-type').value;
  const dist = document.getElementById('f-dist').value;
  const maxPrice = document.getElementById('f-price').value;

  const filtered = listings.filter(l => {
    const matchType = (type === 'All' || l.type === type);
    const matchDist = (dist === 'All' || l.dist === dist);
    const matchPrice = (!maxPrice || l.price <= parseInt(maxPrice));
    return matchType && matchDist && matchPrice;
  });

  renderBrowseResults(filtered);
}

function renderBrowseResults(data) {
  const grid = document.getElementById('browseGrid');
  if(data.length === 0) {
    grid.innerHTML = `<p style="padding:40px; color:var(--muted);">No properties found matching your criteria.</p>`;
    return;
  }

  grid.innerHTML = data.map(l => `
    <div class="mini-card" style="flex-direction:column; padding:20px; gap:0;" onclick="viewProperty(${l.id})">
      <div class="mini-img" style="width:100%; height:160px; font-size:60px; margin-bottom:15px;">${icons[l.type]}</div>
      <div class="mini-info">
        <div class="mini-price">LKR ${l.price.toLocaleString()}</div>
        <div class="mini-title" style="font-size:16px;">${l.title}</div>
        <div class="mini-loc">📍 ${l.dist} | ${l.type}</div>
      </div>
    </div>
  `).join('');
}

function resetFilters() {
  document.getElementById('f-dist').value = 'All';
  document.getElementById('f-type').value = 'All';
  document.getElementById('f-price').value = '';
  applyFilters();
}

// --- POST AD LOGIC ---
function submitAd() {
  const title = document.getElementById('p-title').value;
  const type = document.getElementById('p-type').value;
  const dist = document.getElementById('p-dist').value;
  const price = document.getElementById('p-price').value;

  if(!title || !price) {
    alert("Please enter a Title and Price.");
    return;
  }

  const newListing = {
    id: Date.now(),
    title: title,
    type: type,
    dist: dist,
    price: parseInt(price),
    // Simulate a random coordinate near the center of the island for the map
    lat: 6.5 + (Math.random() * 1.5), 
    lng: 79.9 + (Math.random() * 1.0)
  };

  listings.push(newListing);
  alert("Listing Published Successfully!");
  
  // Reset form
  document.getElementById('p-title').value = "";
  document.getElementById('p-price').value = "";
  
  showPage('home');
}

function viewProperty(id) {
  const p = listings.find(item => item.id === id);
  alert(`Property Details:\n\nTitle: ${p.title}\nPrice: LKR ${p.price.toLocaleString()}\nDistrict: ${p.dist}\nCategory: ${p.type}`);
}

// Initialize on Load
window.onload = initHome;
</script>
</body>
</html>
